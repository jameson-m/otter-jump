<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a1a2a" />
<title>Otter Jump</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    /* position:fixed + inset:0 avoids iOS 100vh / URL-bar layout jumps and
       rubber-band scrolling, and keeps the canvas truly full-screen. */
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #0a1a2a;
    overflow: hidden;
    /* No selection / callouts / scroll-bounce on touch */
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    overscroll-behavior: none;
  }
  #game {
    display: block;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script type="module">
import { PHYS, generateLevel } from "./js/levelgen.js";
"use strict";
(() => {
  // ----------------------------------------------------------------------------
  // Otter Jump — an auto-running platformer.
  // The otter runs to the right on its own; the only control is JUMP
  // (Space / ArrowUp / W / click / tap). Time your jumps to clear gaps and
  // sea-urchins, scoop up fish, and reach the otter's favorite shiny rock.
  // ----------------------------------------------------------------------------

  // The world is described in fixed "world units"; a camera (set up further down)
  // maps a window of those units onto the device screen and fills it — portrait
  // phone, landscape tablet, or desktop — with no letterboxing.

  // --- Physics tuning. Shared with the level generator (js/levelgen.js) via the
  // PHYS object, so the generator's solvability math and the game never diverge.
  const {
    RUN_SPEED, GRAVITY, JUMP_V, JUMP_CUT, COYOTE_TIME, JUMP_BUFFER,
    MAX_FALL, DEATH_Y, URCHIN_R, SOLID,
  } = PHYS;

  // --- The active level is procedurally generated (see js/levelgen.js). ---
  // platforms {x,y,w}, urchins {x,y}, fish {x,y}, goal {x,y}, plus the world
  // width and the otter's spawn point. These are reassigned by loadLevel().
  let PLATFORMS, URCHINS, FISH, GOAL, WORLD_W, startX, startTop;
  function loadLevel(level, difficulty) {
    const lv = generateLevel({ level, difficulty });
    PLATFORMS = lv.platforms;
    URCHINS = lv.urchins;
    FISH = lv.fish.map((f) => ({ x: f.x, y: f.y, got: false }));
    GOAL = lv.goal;
    WORLD_W = lv.worldW;
    startX = lv.startX;
    startTop = lv.startTop;
  }
  // For now a single generated level; progression across levels comes next.
  loadLevel(1, "kid");

  // ----------------------------------------------------------------------------
  // Tiny procedural sound effects via WebAudio (no asset files).
  // ----------------------------------------------------------------------------
  const Sound = (() => {
    let ctx = null;
    let muted = false;
    let unlocked = false;
    // Must be called from inside a user-gesture handler (iOS requirement).
    function ensure() {
      if (!ctx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) ctx = new AC();
      }
      if (ctx && ctx.state === "suspended") ctx.resume();
      // Play one near-silent buffer the first time to fully unlock iOS audio.
      if (ctx && !unlocked) {
        try {
          const src = ctx.createBufferSource();
          src.buffer = ctx.createBuffer(1, 1, 22050);
          src.connect(ctx.destination);
          src.start(0);
          unlocked = true;
        } catch (e) {}
      }
      return ctx;
    }
    function tone(freqStart, freqEnd, dur, type, vol) {
      const c = ensure();
      if (!c || muted) return;
      const t0 = c.currentTime;
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = type || "square";
      osc.frequency.setValueAtTime(freqStart, t0);
      osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), t0 + dur);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain).connect(c.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    }
    return {
      unlock: ensure,
      jump:    () => tone(380, 720, 0.14, "square",   0.16),
      land:    () => tone(220, 130, 0.09, "sine",     0.12),
      collect: () => { tone(660, 660, 0.07, "triangle", 0.14); setTimeout(() => tone(990, 990, 0.09, "triangle", 0.14), 70); },
      die:     () => tone(440, 90,  0.45, "sawtooth", 0.18),
      win:     () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, f, 0.16, "triangle", 0.16), i * 110)); },
      toggleMute: () => { muted = !muted; return muted; },
      isMuted: () => muted,
      suspend: () => { if (ctx && ctx.state === "running") ctx.suspend(); },
      resume:  () => { if (ctx && ctx.state === "suspended") ctx.resume(); },
    };
  })();

  // ----------------------------------------------------------------------------
  // Canvas, camera & responsive scaling
  //
  // The camera shows a window of the world that always fills the screen. We
  // guarantee a minimum visible WIDTH (forward look-ahead, the gameplay-critical
  // axis) and HEIGHT (enough to see jump apexes), so the game stays fair from a
  // tall portrait iPhone to a wide desktop. The waterline is pinned to the bottom
  // edge, so in portrait the extra vertical space becomes sky above the action.
  // ----------------------------------------------------------------------------
  const VIEW_W_MIN   = 480;   // min world units visible horizontally (look-ahead)
  const VIEW_H_MIN   = 760;   // min world units visible vertically (jump apexes)
  const VIEW_BOTTOM  = 726;   // world-y pinned to the bottom edge of the screen
  const WATER_Y      = 648;   // world-y of the water surface
  const OTTER_ANCHOR = 0.30;  // otter rides this fraction from the left of the view

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  let dpr = 1, cssW = 1, cssH = 1;            // viewport, CSS px
  let scale = 1;                              // device px per world unit
  let viewW = VIEW_W_MIN, viewH = VIEW_H_MIN; // visible world units
  let camX = 0, camY = 0;                     // world coords at the view's top-left
  let skyGradient, waterGradient;
  const insets = { top: 0, right: 0, bottom: 0, left: 0 }; // iOS safe-area, CSS px

  // Hidden probe whose padding resolves the safe-area-inset env() values so we
  // can keep the HUD/menus clear of the notch, Dynamic Island and home indicator.
  const insetProbe = document.createElement("div");
  insetProbe.style.cssText =
    "position:fixed;top:0;left:0;width:0;height:0;visibility:hidden;pointer-events:none;" +
    "padding:env(safe-area-inset-top) env(safe-area-inset-right) " +
    "env(safe-area-inset-bottom) env(safe-area-inset-left);";
  document.body.appendChild(insetProbe);
  function readInsets() {
    const s = getComputedStyle(insetProbe);
    insets.top    = parseFloat(s.paddingTop)    || 0;
    insets.right  = parseFloat(s.paddingRight)  || 0;
    insets.bottom = parseFloat(s.paddingBottom) || 0;
    insets.left   = parseFloat(s.paddingLeft)   || 0;
  }

  function resize() {
    dpr  = Math.min(window.devicePixelRatio || 1, 3);
    cssW = Math.max(1, window.innerWidth);
    cssH = Math.max(1, window.innerHeight);
    const cw = Math.round(cssW * dpr), ch = Math.round(cssH * dpr);
    canvas.width = cw;
    canvas.height = ch;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";

    // Fill the screen while guaranteeing the minimum visible world window.
    scale = Math.min(cw / VIEW_W_MIN, ch / VIEW_H_MIN);
    viewW = cw / scale;
    viewH = ch / scale;
    camY  = VIEW_BOTTOM - viewH; // pin the waterline to the bottom of the screen

    readInsets();

    // (Re)build the gradients in screen space (top..bottom of the visible area),
    // rebuilt on resize since the visible height changes with the viewport.
    skyGradient = ctx.createLinearGradient(0, 0, 0, WATER_Y - camY);
    skyGradient.addColorStop(0,   "#6fc0ec");
    skyGradient.addColorStop(0.6, "#a3daf4");
    skyGradient.addColorStop(1,   "#e3f4fc");
    waterGradient = ctx.createLinearGradient(0, WATER_Y - camY, 0, viewH);
    waterGradient.addColorStop(0, "#3fb4d8");
    waterGradient.addColorStop(1, "#1f6f96");
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", resize);
  if (window.visualViewport) window.visualViewport.addEventListener("resize", resize);
  resize();

  // ----------------------------------------------------------------------------
  // Game state
  // ----------------------------------------------------------------------------
  const STATE = { TITLE: 0, PLAYING: 1, DEAD: 2, WON: 3 };
  let state = STATE.TITLE;
  let inputLock = 0;     // brief lock after a state change so one press isn't reused
  let shake = 0;         // screen-shake magnitude
  let level = 1;             // current level number
  let difficulty = "kid";    // "kid" | "normal" — selection UI arrives with the menu
  let gameMode = "normal";   // "normal" (forgiving) | "roguelike" (death -> level 1)
  let runCleared = 0;        // levels cleared in the current run (the roguelike score)
  let best = 0;              // best fish caught in a single level (secondary)
  let bestLevel = 0;         // highest level reached, Normal mode
  let bestRogue = 0;         // most levels cleared in a single Roguelike run
  try {
    best = parseInt(localStorage.getItem("otterjump.best") || "0", 10) || 0;
    bestLevel = parseInt(localStorage.getItem("otterjump.bestlevel") || "0", 10) || 0;
    bestRogue = parseInt(localStorage.getItem("otterjump.bestrogue") || "0", 10) || 0;
  } catch (e) {}

  const otter = {
    x: startX, y: startTop - PHYS.OTTER_H, w: PHYS.OTTER_W, h: PHYS.OTTER_H,
    vy: 0, grounded: true, coyote: 0, runAnim: 0, jumpPose: 0, face: 1,
  };

  let score = 0;
  let bufferTimer = 0;   // jump-buffer countdown
  let jumpHeld = false;
  let particles = [];
  let elapsed = 0;       // total time, for animations
  let winTimer = 0;

  function resetRun() {
    otter.x = startX;
    otter.y = startTop - otter.h;
    otter.vy = 0;
    otter.grounded = true;
    otter.coyote = 0;
    otter.runAnim = 0;
    otter.jumpPose = 0;
    camX = 0;
    score = 0;
    bufferTimer = 0;
    shake = 0;
    winTimer = 0;
    particles = [];
    FISH.forEach(f => (f.got = false));
  }

  // Seconds the "level cleared" celebration holds before auto-advancing.
  const CLEAR_HOLD = 1.8;

  function startGame() {            // fresh game/run from the title
    level = 1;
    runCleared = 0;
    loadLevel(level, difficulty);
    resetRun();
    state = STATE.PLAYING;
    inputLock = 0.15;
  }
  function advanceLevel() {         // on clearing a level
    level += 1;
    loadLevel(level, difficulty);
    resetRun();
    state = STATE.PLAYING;
    inputLock = 0.15;
  }
  function retryLevel() {           // after a splash
    if (gameMode === "roguelike") {
      startGame();                  // the run is over — back to Level 1
    } else {
      resetRun();                   // forgiving — replay the same level, keep progress
      state = STATE.PLAYING;
      inputLock = 0.15;
    }
  }

  // ----------------------------------------------------------------------------
  // Particles
  // ----------------------------------------------------------------------------
  function spawnParticles(x, y, count, conf) {
    for (let i = 0; i < count; i++) {
      const a = conf.angle != null ? conf.angle + (Math.random() - 0.5) * conf.spread : Math.random() * Math.PI * 2;
      const sp = conf.speedMin + Math.random() * (conf.speedMax - conf.speedMin);
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - (conf.lift || 0),
        life: conf.life * (0.7 + Math.random() * 0.6),
        max: conf.life,
        size: conf.size * (0.6 + Math.random() * 0.8),
        grav: conf.grav != null ? conf.grav : 1400,
        color: Array.isArray(conf.color) ? conf.color[(Math.random() * conf.color.length) | 0] : conf.color,
        shape: conf.shape || "circle",
      });
    }
  }
  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      p.vy += p.grav * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }
  }

  // ----------------------------------------------------------------------------
  // Input
  // ----------------------------------------------------------------------------
  function pressJump() {
    Sound.unlock();
    if (inputLock > 0) return;
    if (state === STATE.TITLE) { startGame(); return; }
    if (state === STATE.DEAD)  { retryLevel(); return; }
    if (state === STATE.WON)   { advanceLevel(); return; } // tap to skip the celebration
    // PLAYING: buffer the jump; the physics step decides if it can fire.
    bufferTimer = JUMP_BUFFER;
    jumpHeld = true;
  }
  function releaseJump() {
    jumpHeld = false;
    // Variable jump height: cut the rise short if released while ascending.
    if (state === STATE.PLAYING && otter.vy < 0) otter.vy *= JUMP_CUT;
  }

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") {
      e.preventDefault();
      if (!e.repeat) pressJump();
    } else if (e.code === "KeyM") {
      Sound.toggleMute();
    }
  }, { passive: false });
  window.addEventListener("keyup", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") releaseJump();
  });

  // Pointer events cover mouse, touch and pen without double-firing. The canvas
  // fills the screen, so a tap anywhere = jump. pointerup is bound to window so a
  // release that drifts off the canvas still registers.
  canvas.addEventListener("pointerdown", (e) => { e.preventDefault(); pressJump(); }, { passive: false });
  window.addEventListener("pointerup", releaseJump);
  window.addEventListener("pointercancel", releaseJump); // iOS may cancel instead of up
  window.addEventListener("contextmenu", (e) => e.preventDefault());

  // Suppress iOS scrolling, pinch-zoom, double-tap-zoom and long-press callouts
  // so the only thing a touch does is jump.
  document.addEventListener("touchmove", (e) => e.preventDefault(), { passive: false });
  document.addEventListener("dblclick", (e) => e.preventDefault(), { passive: false });
  ["gesturestart", "gesturechange", "gestureend"].forEach((ev) =>
    document.addEventListener(ev, (e) => e.preventDefault(), { passive: false }));

  // ----------------------------------------------------------------------------
  // Collision helpers
  // ----------------------------------------------------------------------------
  function overlaps(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function die() {
    if (state !== STATE.PLAYING) return;
    state = STATE.DEAD;
    inputLock = 0.5;
    shake = 16;
    Sound.die();
    spawnParticles(otter.x + otter.w / 2, otter.y + otter.h / 2, 26, {
      speedMin: 120, speedMax: 460, life: 0.9, size: 7, lift: 240,
      color: ["#bfe9ff", "#7fd0ff", "#ffffff", "#aee4ff"], grav: 1500,
    });
  }

  function win() {
    if (state !== STATE.PLAYING) return;
    state = STATE.WON;
    inputLock = 0.6;
    winTimer = 0;
    runCleared += 1; // a level was cleared this run
    Sound.win();
    const save = (k, v) => { try { localStorage.setItem(k, String(v)); } catch (e) {} };
    if (level > bestLevel) { bestLevel = level; save("otterjump.bestlevel", bestLevel); }
    // Only true Roguelike runs (which reset to Level 1 on death) write the run best;
    // otherwise Normal's unlimited retries would inflate it.
    if (gameMode === "roguelike" && runCleared > bestRogue) { bestRogue = runCleared; save("otterjump.bestrogue", bestRogue); }
    if (score > best) { best = score; save("otterjump.best", best); }
    spawnParticles(GOAL.x, GOAL.y - 90, 80, {
      speedMin: 120, speedMax: 520, life: 1.6, size: 8, lift: 360,
      color: ["#ffd54a", "#ff7eb6", "#7be0ff", "#9cff8a", "#ffffff", "#c79bff"],
      grav: 900, shape: "rect",
    });
  }

  // ----------------------------------------------------------------------------
  // Update
  // ----------------------------------------------------------------------------
  function update(dt) {
    elapsed += dt;
    if (inputLock > 0) inputLock = Math.max(0, inputLock - dt);
    updateParticles(dt);
    if (shake > 0) shake = Math.max(0, shake - dt * 40);

    if (state === STATE.WON) {
      winTimer += dt;
      // little victory hop in place
      otter.vy += GRAVITY * dt;
      otter.y += otter.vy * dt;
      if (otter.y >= GOAL.y - otter.h) {
        otter.y = GOAL.y - otter.h;
        if (winTimer % 0.7 < dt && otter.vy >= 0) otter.vy = -480;
        else otter.vy = 0;
      }
      if (winTimer >= CLEAR_HOLD) advanceLevel(); // auto-advance after the celebration
      return;
    }
    if (state !== STATE.PLAYING) {
      // idle bob on title/dead screens for a touch of life
      otter.runAnim += dt * 6;
      return;
    }

    // --- Auto-run ---
    const prevX = otter.x, prevY = otter.y;
    const prevBottom = prevY + otter.h;
    otter.x += RUN_SPEED * dt;

    // Update coyote/buffer timers.
    if (otter.grounded) otter.coyote = COYOTE_TIME;
    else otter.coyote = Math.max(0, otter.coyote - dt);
    if (bufferTimer > 0) bufferTimer = Math.max(0, bufferTimer - dt);

    // Fire a jump if buffered and we're on (or just left) the ground.
    if (bufferTimer > 0 && otter.coyote > 0) {
      otter.vy = -JUMP_V;
      otter.grounded = false;
      otter.coyote = 0;
      bufferTimer = 0;
      otter.jumpPose = 1;
      Sound.jump();
      spawnParticles(otter.x + 8, otter.y + otter.h, 8, {
        angle: Math.PI / 2, spread: 1.6, speedMin: 60, speedMax: 200,
        life: 0.35, size: 5, color: ["#d8c39a", "#c2a877", "#e7d8b5"], grav: 900,
      });
    }

    // --- Gravity / vertical integration ---
    otter.vy = Math.min(MAX_FALL, otter.vy + GRAVITY * dt);
    otter.y += otter.vy * dt;

    // --- Horizontal collisions (running into a wall = crash) ---
    // Check against the position the otter currently occupies; an overlap here
    // means we ran our body into the side of a higher platform.
    for (const p of PLATFORMS) {
      // Use prevY for the vertical span so that landing onto a higher ledge
      // (where we're descending from above) isn't misread as a wall hit.
      if (overlaps(otter.x, prevY, otter.w, otter.h, p.x, p.y, p.w, SOLID)) {
        die();
        return;
      }
    }

    // --- Vertical collisions (land on tops) ---
    otter.grounded = false;
    for (const p of PLATFORMS) {
      if (otter.x + otter.w <= p.x || otter.x >= p.x + p.w) continue; // not horizontally over it
      const top = p.y;
      if (otter.vy >= 0 && prevBottom <= top + 1 && otter.y + otter.h >= top) {
        otter.y = top - otter.h;
        otter.vy = 0;
        if (!otter.grounded && otter.jumpPose > 0) {
          Sound.land();
          spawnParticles(otter.x + otter.w / 2, otter.y + otter.h, 6, {
            angle: Math.PI / 2, spread: 1.8, speedMin: 40, speedMax: 150,
            life: 0.28, size: 4, color: ["#d8c39a", "#c2a877"], grav: 800,
          });
        }
        otter.grounded = true;
        otter.jumpPose = 0;
      }
    }

    // --- Urchins (touch = death) ---
    for (const u of URCHINS) {
      const ux = u.x - URCHIN_R, uy = u.y - URCHIN_R * 2;
      if (overlaps(otter.x + 6, otter.y + 6, otter.w - 12, otter.h - 8, ux, uy, URCHIN_R * 2, URCHIN_R * 2)) {
        die();
        return;
      }
    }

    // --- Fish pickups ---
    for (const f of FISH) {
      if (f.got) continue;
      if (overlaps(otter.x, otter.y, otter.w, otter.h, f.x - 22, f.y - 16, 44, 32)) {
        f.got = true;
        score++;
        Sound.collect();
        spawnParticles(f.x, f.y, 12, {
          speedMin: 60, speedMax: 240, life: 0.5, size: 5, lift: 80,
          color: ["#ffd54a", "#ffffff", "#ffb347"], grav: 700,
        });
      }
    }

    // --- Goal ---
    if (otter.x + otter.w * 0.5 >= GOAL.x) { win(); }

    // --- Fell into the water ---
    if (otter.y > DEATH_Y) { die(); return; }

    // --- Animation + camera ---
    otter.runAnim += dt * (otter.grounded ? 12 : 4);
    const maxCam = WORLD_W - viewW;
    camX = maxCam <= 0
      ? maxCam / 2 // view wider than the whole world (ultra-wide): center it
      : clamp(otter.x + otter.w / 2 - viewW * OTTER_ANCHOR, 0, maxCam);
  }

  // ----------------------------------------------------------------------------
  // Rendering
  // ----------------------------------------------------------------------------
  function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

  // The background is drawn in *screen space* (origin at the view's top-left,
  // spanning 0..viewW × 0..viewH world units) with parallax derived from camX.
  function drawBackground() {
    // Sky fills the whole visible area.
    ctx.fillStyle = skyGradient;
    ctx.fillRect(-8, -8, viewW + 16, viewH + 16);

    // Sun — parked near the top of the view (effectively infinitely far).
    const sunX = viewW * 0.80, sunY = viewH * 0.15;
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = "#fff4c2";
    ctx.beginPath(); ctx.arc(sunX, sunY, 56, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.22;
    ctx.beginPath(); ctx.arc(sunX, sunY, 88, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Parallax clouds, tiled across a span a little wider than the view.
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    const span = viewW + 280;
    for (let i = 0; i < 7; i++) {
      const x = (((i * 250 - camX * 0.25 + elapsed * 10) % span) + span) % span - 140;
      const y = viewH * 0.08 + (i % 3) * (viewH * 0.06) + 24;
      cloud(x, y, 0.85 + (i % 3) * 0.22);
    }

    // Rolling hills (two parallax layers), anchored just behind the waterline.
    drawHills(0.28, 560, "#bfe3c8", 190, 360);
    drawHills(0.48, 606, "#9bd6ab", 150, 280);
  }

  function cloud(x, y, s) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.beginPath();
    ctx.arc(0, 0, 34, 0, Math.PI * 2);
    ctx.arc(40, 8, 28, 0, Math.PI * 2);
    ctx.arc(-38, 10, 26, 0, Math.PI * 2);
    ctx.arc(6, 20, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // par = parallax factor (0 fixed to screen .. 1 moves with the world).
  function drawHills(par, baseWorldY, color, h, spacing) {
    const baseY = baseWorldY - camY;   // screen-space baseline
    const bottom = viewH + 6;
    const phase = (((camX * par) % spacing) + spacing) % spacing;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-spacing * 2, bottom);
    let x = -spacing - phase;
    ctx.lineTo(x, baseY);
    for (; x <= viewW + spacing; x += spacing) {
      ctx.quadraticCurveTo(x + spacing / 2, baseY - h, x + spacing, baseY);
    }
    ctx.lineTo(viewW + spacing * 2, bottom);
    ctx.closePath();
    ctx.fill();
  }

  // Water is drawn in screen space too, and rendered *after* the foreground so a
  // falling otter sinks behind the surface.
  function drawWater() {
    const top = WATER_Y - camY;        // screen-space y of the water surface
    const bottom = viewH + 6;
    ctx.fillStyle = waterGradient;
    ctx.beginPath();
    ctx.moveTo(-6, bottom);
    ctx.lineTo(-6, top);
    for (let x = 0; x <= viewW; x += 22) {
      const y = top + Math.sin((x + camX * 0.5) * 0.02 + elapsed * 2) * 6;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(viewW + 6, top);
    ctx.lineTo(viewW + 6, bottom);
    ctx.closePath();
    ctx.fill();

    // Sparkle glints. Wrap over a slightly-wider-than-view span (with margin) so
    // a glint slides fully off one edge before reappearing on the other.
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    const span = viewW + 40;
    for (let i = 0; i < 16; i++) {
      const x = (((i * 120 - camX * 0.5) % span) + span) % span - 20;
      const y = top + 18 + (i % 4) * 12 + Math.sin(elapsed * 3 + i) * 3;
      ctx.fillRect(x, y, 10, 2);
    }
  }

  function drawPlatform(p) {
    if (p.x > camX + viewW + 40 || p.x + p.w < camX - 40) return;
    const x = p.x;
    const top = p.y;
    const bottom = VIEW_BOTTOM + 80; // extend the dirt below the screen / waterline

    // Dirt body.
    ctx.fillStyle = "#7a5230";
    roundRectPath(x, top, p.w, bottom - top, 12);
    ctx.fill();
    // Grass cap.
    ctx.fillStyle = "#5fbf63";
    roundRectPath(x, top, p.w, 22, 12);
    ctx.fill();
    ctx.fillStyle = "#4ea552";
    ctx.fillRect(x + 8, top + 18, p.w - 16, 5);
    // Little grass tufts.
    ctx.fillStyle = "#6fd17a";
    for (let gx = x + 16; gx < x + p.w - 10; gx += 46) {
      ctx.beginPath();
      ctx.moveTo(gx, top);
      ctx.lineTo(gx + 5, top - 12);
      ctx.lineTo(gx + 10, top);
      ctx.fill();
    }
  }

  function roundRectPath(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawUrchin(u) {
    if (u.x > camX + viewW + 60 || u.x < camX - 60) return;
    const x = u.x, y = u.y - URCHIN_R;
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = "#5b2c83";
    ctx.strokeStyle = "#3f1d5e";
    ctx.lineWidth = 4;
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2 + Math.sin(elapsed * 2) * 0.05;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * (URCHIN_R + 12), Math.sin(a) * (URCHIN_R + 12));
      ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0, 0, URCHIN_R, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#7b46a6";
    ctx.beginPath(); ctx.arc(-5, -5, URCHIN_R * 0.5, 0, Math.PI * 2); ctx.fill();
    // grumpy eyes
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-6, -2, 4, 0, Math.PI * 2); ctx.arc(7, -2, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath(); ctx.arc(-6, -1, 2, 0, Math.PI * 2); ctx.arc(7, -1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawFish(f) {
    if (f.got) return;
    if (f.x > camX + viewW + 40 || f.x < camX - 40) return;
    const x = f.x;
    const y = f.y + Math.sin(elapsed * 3 + f.x) * 6;
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = "#ff9b3d";
    ctx.beginPath();
    ctx.ellipse(0, 0, 18, 11, 0, 0, Math.PI * 2);
    ctx.fill();
    // tail
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(26, -10);
    ctx.lineTo(26, 10);
    ctx.closePath();
    ctx.fill();
    // belly highlight
    ctx.fillStyle = "#ffd29a";
    ctx.beginPath(); ctx.ellipse(-2, 3, 11, 5, 0, 0, Math.PI * 2); ctx.fill();
    // eye
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-9, -2, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath(); ctx.arc(-9, -2, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawGoal() {
    if (GOAL.x > camX + viewW + 160 || GOAL.x < camX - 160) return;
    const x = GOAL.x;
    const baseY = GOAL.y;
    // pedestal
    ctx.fillStyle = "#caa24a";
    roundRectPath(x - 46, baseY - 30, 92, 30, 8);
    ctx.fill();
    ctx.fillStyle = "#e3c873";
    ctx.fillRect(x - 40, baseY - 30, 80, 8);

    // glow
    const pulse = 0.5 + Math.sin(elapsed * 3) * 0.2;
    ctx.save();
    ctx.globalAlpha = 0.35 * pulse + 0.2;
    const rg = ctx.createRadialGradient(x, baseY - 70, 6, x, baseY - 70, 80);
    rg.addColorStop(0, "#ffffff");
    rg.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(x, baseY - 70, 80, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // the shiny rock — bobbing a little
    const ry = baseY - 60 + Math.sin(elapsed * 2) * 4;
    ctx.save();
    ctx.translate(x, ry);
    const grad = ctx.createLinearGradient(0, -28, 0, 24);
    grad.addColorStop(0, "#cfd9e6");
    grad.addColorStop(0.5, "#9aa7ba");
    grad.addColorStop(1, "#6f7c90");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-30, 10);
    ctx.quadraticCurveTo(-34, -18, -6, -24);
    ctx.quadraticCurveTo(26, -28, 32, -2);
    ctx.quadraticCurveTo(34, 18, 8, 22);
    ctx.quadraticCurveTo(-22, 24, -30, 10);
    ctx.closePath();
    ctx.fill();
    // facets
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.beginPath();
    ctx.moveTo(-6, -20); ctx.lineTo(10, -8); ctx.lineTo(-2, 2); ctx.closePath(); ctx.fill();
    // sparkles
    sparkle(14, -16, 6 + Math.sin(elapsed * 5) * 2);
    sparkle(-14, -6, 4 + Math.cos(elapsed * 4) * 2);
    sparkle(6, 12, 5 + Math.sin(elapsed * 6 + 1) * 2);
    ctx.restore();
  }

  function sparkle(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.moveTo(0, -r); ctx.lineTo(r * 0.25, -r * 0.25);
    ctx.lineTo(r, 0); ctx.lineTo(r * 0.25, r * 0.25);
    ctx.lineTo(0, r); ctx.lineTo(-r * 0.25, r * 0.25);
    ctx.lineTo(-r, 0); ctx.lineTo(-r * 0.25, -r * 0.25);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawOtter(screenX, screenY) {
    const t = otter.runAnim;
    const airborne = !otter.grounded && state === STATE.PLAYING;
    const bob = otter.grounded ? Math.sin(t * 2) * 2 : 0;
    const cx = screenX + otter.w / 2;
    const cy = screenY + otter.h / 2 + bob;

    ctx.save();
    ctx.translate(cx, cy);

    // shadow on ground
    if (otter.grounded) {
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = "#000";
      ctx.beginPath();
      ctx.ellipse(0, otter.h / 2 + 4, otter.w * 0.5, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    const brown = "#8a5a36";
    const brownDark = "#6f4628";
    const belly = "#d8b489";

    // tail (sways)
    const tailSway = Math.sin(t * 2) * 0.3 + (airborne ? -0.4 : 0);
    ctx.save();
    ctx.rotate(tailSway);
    ctx.fillStyle = brownDark;
    ctx.beginPath();
    ctx.moveTo(-otter.w * 0.42, 6);
    ctx.quadraticCurveTo(-otter.w * 0.95, 2, -otter.w * 0.9, 20);
    ctx.quadraticCurveTo(-otter.w * 0.55, 18, -otter.w * 0.34, 12);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // back legs (running cycle)
    const legA = airborne ? -0.5 : Math.sin(t) * 0.5;
    const legB = airborne ? 0.6 : Math.sin(t + Math.PI) * 0.5;
    ctx.fillStyle = brownDark;
    foot(-6, otter.h * 0.32, legA);
    foot(10, otter.h * 0.32, legB);

    // body
    ctx.fillStyle = brown;
    ctx.beginPath();
    ctx.ellipse(0, 0, otter.w * 0.42, otter.h * 0.46, 0, 0, Math.PI * 2);
    ctx.fill();
    // belly
    ctx.fillStyle = belly;
    ctx.beginPath();
    ctx.ellipse(2, 6, otter.w * 0.26, otter.h * 0.32, 0, 0, Math.PI * 2);
    ctx.fill();

    // front arms (reach forward while running, up while jumping)
    ctx.fillStyle = brown;
    if (airborne) {
      arm(otter.w * 0.28, -6, -0.9);
      arm(otter.w * 0.18, -8, -1.2);
    } else {
      arm(otter.w * 0.3, 4, Math.sin(t + 1) * 0.5 + 0.2);
    }

    // head
    const hx = otter.w * 0.34, hy = -otter.h * 0.34;
    ctx.fillStyle = brown;
    ctx.beginPath();
    ctx.arc(hx, hy, otter.h * 0.34, 0, Math.PI * 2);
    ctx.fill();
    // ears
    ctx.beginPath();
    ctx.arc(hx - 8, hy - 12, 6, 0, Math.PI * 2);
    ctx.arc(hx + 9, hy - 12, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = brownDark;
    ctx.beginPath();
    ctx.arc(hx - 8, hy - 12, 3, 0, Math.PI * 2);
    ctx.arc(hx + 9, hy - 12, 3, 0, Math.PI * 2);
    ctx.fill();
    // muzzle
    ctx.fillStyle = belly;
    ctx.beginPath();
    ctx.ellipse(hx + 6, hy + 7, 11, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    // nose
    ctx.fillStyle = "#3a2418";
    ctx.beginPath();
    ctx.ellipse(hx + 11, hy + 3, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // eyes
    ctx.fillStyle = "#1a1a1a";
    const blink = (Math.sin(elapsed * 1.3) > 0.97) ? 0.2 : 1;
    ctx.save();
    ctx.translate(hx + 2, hy - 4);
    ctx.scale(1, blink);
    ctx.beginPath(); ctx.arc(0, 0, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(13, 0, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(hx + 3.2, hy - 5, 1.1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx + 16.2, hy - 5, 1.1, 0, Math.PI * 2); ctx.fill();
    // whiskers
    ctx.strokeStyle = "rgba(80,55,35,0.7)";
    ctx.lineWidth = 1.2;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(hx + 12, hy + 6 + i * 2);
      ctx.lineTo(hx + 28, hy + 3 + i * 5);
      ctx.stroke();
    }

    ctx.restore();

    function foot(ox, oy, ang) {
      ctx.save();
      ctx.translate(ox, oy);
      ctx.rotate(ang);
      ctx.beginPath();
      ctx.ellipse(0, 8, 7, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    function arm(ox, oy, ang) {
      ctx.save();
      ctx.translate(ox, oy);
      ctx.rotate(ang);
      ctx.beginPath();
      ctx.ellipse(6, 0, 10, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const a = clamp(p.life / p.max, 0, 1);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      if (p.shape === "rect") {
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  // --- HUD & overlays (CSS-px screen space, kept clear of the safe area) ---
  function drawHUD() {
    const left = insets.left + 14;
    const right = cssW - insets.right - 14;
    const top = insets.top + 12;
    const bw = Math.max(40, right - left);

    // Progress bar across the top.
    const prog = clamp((otter.x - startX) / (GOAL.x - startX), 0, 1);
    ctx.fillStyle = "rgba(255,255,255,0.45)";
    roundRectPath(left, top, bw, 8, 4); ctx.fill();
    ctx.fillStyle = "#2f9e57";
    roundRectPath(left, top, bw * prog, 8, 4); ctx.fill();
    ctx.fillStyle = "#7f8da0";
    ctx.beginPath(); ctx.arc(left + bw, top + 4, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#8a5a36";
    ctx.beginPath(); ctx.arc(left + bw * prog, top + 4, 6, 0, Math.PI * 2); ctx.fill();

    // Fish counter just below the bar.
    const cy = top + 30;
    ctx.save();
    ctx.translate(left + 11, cy);
    ctx.fillStyle = "#ff9b3d";
    ctx.beginPath(); ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(9, 0); ctx.lineTo(17, -6); ctx.lineTo(17, 6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#1a1a1a"; ctx.beginPath(); ctx.arc(-5, -2, 1.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = "#0d2a3a";
    ctx.font = "bold 20px system-ui, sans-serif";
    ctx.textBaseline = "middle";
    ctx.textAlign = "left";
    ctx.fillText(score + " / " + FISH.length, left + 30, cy);

    // Level indicator (top-center).
    ctx.fillStyle = "#0d2a3a";
    ctx.font = "bold 18px system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Level " + level, cssW / 2, cy);

    if (Sound.isMuted()) {
      ctx.fillStyle = "rgba(13,42,58,0.6)";
      ctx.font = "14px system-ui, sans-serif";
      ctx.textAlign = "right";
      ctx.fillText("muted (M)", right, cy);
    }
  }

  function overlayPanel() {
    ctx.fillStyle = "rgba(8,24,38,0.5)";
    ctx.fillRect(0, 0, cssW, cssH);
  }

  // Centered text that auto-shrinks to fit the available width (narrow phones).
  function centerText(text, y, size, color, weight, maxW) {
    weight = weight || "bold";
    let s = size;
    ctx.font = weight + " " + s + "px system-ui, sans-serif";
    if (maxW) {
      while (s > 9 && ctx.measureText(text).width > maxW) {
        s -= 1;
        ctx.font = weight + " " + s + "px system-ui, sans-serif";
      }
    }
    ctx.fillStyle = color;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, cssW / 2, y);
  }

  function pulseHint(text, y) {
    const a = 0.6 + Math.sin(elapsed * 4) * 0.4;
    ctx.globalAlpha = a;
    centerText(text, y, 26, "#ffffff", "bold", cssW - 48);
    ctx.globalAlpha = 1;
  }

  function drawTitle() {
    overlayPanel();
    const cy = cssH / 2;
    const maxW = cssW - 48;
    // Mascot above the title.
    ctx.save();
    ctx.translate(cssW / 2, cy - 150);
    const ms = clamp(Math.min(cssW / 240, cssH / 520), 1.4, 3.0);
    ctx.scale(ms, ms);
    drawOtterStatic();
    ctx.restore();

    centerText("OTTER JUMP", cy - 78, 58, "#ffe6a3", "900", maxW);
    centerText("Fetch your favorite shiny rock!", cy - 36, 20, "#dff3ff", "700", maxW);
    centerText("The otter runs on its own — you only jump.", cy + 16, 17, "#bfe6ff", "600", maxW);
    centerText("Tap (or press Space) to jump — hold for higher.", cy + 42, 17, "#bfe6ff", "600", maxW);
    pulseHint("Tap to start", cy + 110);
    if (gameMode === "roguelike") {
      if (bestRogue > 0) centerText("Best run: " + bestRogue + " levels", cy + 152, 16, "#9ed0ff", "600", maxW);
    } else if (bestLevel > 0) {
      centerText("Best: reached Level " + bestLevel, cy + 152, 16, "#9ed0ff", "600", maxW);
    }
  }

  function drawDead() {
    overlayPanel();
    const cy = cssH / 2, maxW = cssW - 48;
    centerText("SPLASH!", cy - 56, 66, "#aef0ff", "900", maxW);
    if (gameMode === "roguelike") {
      centerText("Run over — you cleared " + runCleared + (runCleared === 1 ? " level" : " levels"), cy, 22, "#dff3ff", "700", maxW);
      if (bestRogue > 0) centerText("Best run: " + bestRogue, cy + 32, 17, "#9ed0ff", "600", maxW);
      pulseHint("Tap to start a new run", cy + 78);
    } else {
      centerText("Level " + level + " — fish caught: " + score, cy, 22, "#dff3ff", "600", maxW);
      pulseHint("Tap to try again", cy + 64);
    }
  }

  function drawWon() {
    overlayPanel();
    const cy = cssH / 2, maxW = cssW - 48;
    centerText("LEVEL " + level + " CLEARED!", cy - 64, 44, "#ffe6a3", "900", maxW);
    centerText("You fetched the shiny rock!", cy - 24, 20, "#dff3ff", "700", maxW);
    centerText("Fish: " + score + " / " + FISH.length, cy + 18, 24, "#ffffff", "bold", maxW);
    if (FISH.length > 0 && score === FISH.length) centerText("Perfect! ★", cy + 52, 18, "#9cff8a", "700", maxW);
    pulseHint("On to Level " + (level + 1) + " — tap!", cy + 108);
  }

  // A static otter pose for the title screen.
  function drawOtterStatic() {
    const saveAnim = otter.runAnim, saveG = otter.grounded;
    otter.runAnim = 0; otter.grounded = true;
    ctx.save();
    ctx.translate(0, Math.sin(elapsed * 2) * 4);
    drawOtter(-otter.w / 2, -otter.h / 2);
    ctx.restore();
    otter.runAnim = saveAnim; otter.grounded = saveG;
  }

  // ----------------------------------------------------------------------------
  // Render frame
  // ----------------------------------------------------------------------------
  function render() {
    const cw = canvas.width, ch = canvas.height;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = "#0a1a2a";
    ctx.fillRect(0, 0, cw, ch);

    // Screen shake (world units).
    const shx = shake > 0 ? Math.sin(elapsed * 80) * shake : 0;
    const shy = shake > 0 ? Math.cos(elapsed * 73) * shake : 0;

    // Background — screen space (scale only); parallax comes from camX.
    ctx.setTransform(scale, 0, 0, scale, shx * scale, shy * scale);
    drawBackground();

    // Foreground — full world transform (camera applied).
    ctx.setTransform(scale, 0, 0, scale, (-camX + shx) * scale, (-camY + shy) * scale);
    PLATFORMS.forEach(drawPlatform);
    FISH.forEach(drawFish);
    URCHINS.forEach(drawUrchin);
    drawGoal();
    drawParticles();
    // Otter (hidden on the title screen, where the mascot is shown instead).
    if (state !== STATE.TITLE) drawOtter(otter.x, otter.y);

    // Water — screen space, drawn last so a falling otter sinks behind it.
    ctx.setTransform(scale, 0, 0, scale, shx * scale, shy * scale);
    drawWater();

    // UI — CSS px.
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (state === STATE.PLAYING || state === STATE.WON) drawHUD();
    if (state === STATE.TITLE) drawTitle();
    else if (state === STATE.DEAD) drawDead();
    else if (state === STATE.WON) drawWon();
  }

  // ----------------------------------------------------------------------------
  // Main loop — fixed-timestep physics for consistent feel.
  // ----------------------------------------------------------------------------
  const STEP = 1 / 120;
  let acc = 0;
  let last = 0;

  // When the app is backgrounded, requestAnimationFrame pauses. On return, reset
  // the clock so the accumulated wall-time isn't fast-forwarded into the sim, and
  // suspend/resume audio so iOS isn't left holding the context open in the
  // background.
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      Sound.suspend();
    } else {
      last = 0; // next frame() re-seeds the clock, so delta ~0 (no fast-forward)
      acc = 0;
      Sound.resume();
    }
  });

  function frame(now) {
    if (!last) last = now;
    let delta = (now - last) / 1000;
    last = now;
    if (delta > 0.25) delta = 0.25; // avoid spiral-of-death after a tab switch
    acc += delta;
    while (acc >= STEP) {
      update(STEP);
      acc -= STEP;
    }
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
